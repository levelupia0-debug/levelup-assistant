<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        html, body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; height: 100%; width: 100%; background-color: transparent; overflow: hidden; color: white; overscroll-behavior: none; position: fixed; inset: 0; }
        .widget-container { position: absolute; inset: 0; background-color: #06020a; display: flex; flex-direction: column; overflow: hidden; }
        .space-bg { position: absolute; inset: 0; z-index: 0; background-image: radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.4), transparent), radial-gradient(1px 1px at 85% 30%, rgba(255,255,255,0.3), transparent), radial-gradient(1.5px 1.5px at 45% 60%, rgba(255,255,255,0.5), transparent), radial-gradient(1px 1px at 70% 80%, rgba(168,85,247,0.5), transparent), radial-gradient(1px 1px at 25% 85%, rgba(255,255,255,0.4), transparent), radial-gradient(1.5px 1.5px at 90% 10%, rgba(168,85,247,0.5), transparent); background-size: 150px 150px; pointer-events: none; animation: spaceDrift 100s linear infinite; }
        @keyframes spaceDrift { 0% { background-position: 0 0; } 100% { background-position: -300px 300px; } }
        .content-z { position: relative; z-index: 10; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-out-up { animation: fadeOutUp 0.4s ease forwards; }
        @keyframes fadeOutUp { to { opacity: 0; transform: translateY(-20px) scale(0.95); pointer-events: none; height: 0; margin: 0; padding: 0; } }
        .msg-in { animation: msgIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; transform-origin: bottom right; }
        .msg-in-ai { animation: msgIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; transform-origin: bottom left; }
        @keyframes msgIn { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .prompts-overlay { position: absolute; inset: 0; z-index: 50; background: rgba(6, 2, 10, 0.98); backdrop-filter: blur(15px); display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .prompts-overlay.open { transform: translateY(0); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(168, 85, 247, 0.4); }
        .ai-action-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 700; padding: 10px 16px; border-radius: 12px; margin-top: 12px; font-size: 0.85rem; transition: transform 0.2s, filter 0.2s; cursor: pointer; border: none; outline: none; text-align: center; }
        .ai-action-btn:active { transform: scale(0.96); }
        .btn-google { background: white; color: #3c4043; border: 1px solid #dadce0; }
        .btn-google:hover { filter: brightness(0.95); }
        .btn-key { background: linear-gradient(135deg, #a855f7, #3b82f6); color: white; box-shadow: 0 4px 15px rgba(168,85,247,0.4); }
        .btn-key:hover { filter: brightness(1.1); }
        .btn-app { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; }
        .btn-app:hover { background: rgba(255,255,255,0.15); }
        .btn-nav { background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.4); color: #d8b4fe; }
        .btn-nav:hover { background: rgba(168, 85, 247, 0.2); border-color: rgba(168, 85, 247, 0.6); }
        body.mini-mode #appHeader { display: none !important; }
        body.mini-mode #chatArea { display: none !important; }
        body.mini-mode .space-bg { display: none !important; }
        body.mini-mode .widget-container { justify-content: center; background-color: rgba(6, 2, 10, 0.98) !important; backdrop-filter: blur(12px); border-radius: 20px; }
        body.mini-mode #appInputBar { border-top: none; background: transparent !important; height: 100%; display: flex; align-items: center; padding: 0 16px; margin: 0; }
        
        /* Styles pour l'input de clé */
        .key-input-mode #chatInputContainer { display: none; }
        .key-input-mode #keyInputContainer { display: flex !important; }
    </style>
</head>
<body class="">
    <div class="widget-container">

        <div class="content-z flex justify-between items-center px-4 border-b border-white/10 shrink-0 bg-[#06020a]/80 backdrop-blur-md" id="appHeader" style="padding-top: max(12px, env(safe-area-inset-top)); padding-bottom: 12px;">
            <div class="flex items-center gap-2.5 text-white font-bold text-[14px]">

            <div class="flex items-center gap-3">

                <button onclick="window.minimizeIA()" class="w-8 h-8 rounded-full bg-transparent border border-white/10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/5 transition-colors">
                    <i class="fas fa-minus text-[12px]"></i>

                <button onclick="window.closeIA()" class="px-3 py-1.5 rounded-full bg-[#ef4444]/10 border border-[#ef4444]/30 text-[#fca5a5] text-[11px] font-black uppercase tracking-widest flex items-center gap-1.5 hover:bg-[#ef4444]/20 transition-colors shadow-[0_0_10px_rgba(239,68,68,0.2)]">

        <div id="chatArea" class="content-z flex-1 p-5 overflow-y-auto no-scrollbar flex flex-col relative">
            <div id="welcomeBlock" class="flex flex-col items-center justify-center flex-1 my-auto transition-all duration-300">
                <div class="flex flex-col items-center mb-8">
                    <div class="relative w-16 h-16 flex items-center justify-center mb-3">
                        <div class="absolute inset-0 bg-[#a855f7] blur-xl opacity-20 rounded-full"></div>
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-[#a855f7]/20 to-transparent border border-[#a855f7]/40 flex items-center justify-center backdrop-blur-md shadow-[0_0_15px_rgba(168,85,247,0.3)] relative z-10">
                            <i class="fas fa-star text-[20px] text-[#a855f7] drop-shadow-[0_0_8px_rgba(168,85,247,0.8)]"></i>
                        </div>
                    </div>
                    <h2 class="text-white font-black tracking-[0.2em] uppercase text-xl drop-shadow-md">Level<span class="text-[#a855f7]">Up</span></h2>

                </div>

            </div>
            <div id="chatHistory" class="flex flex-col gap-4 justify-end w-full pb-4"></div>
        </div>

        <div class="content-z p-4 shrink-0 bg-[#06020a]/90 backdrop-blur-md border-t border-white/5" id="appInputBar">
            
            <!-- Chat Normal -->
            <div id="chatInputContainer" class="flex items-center gap-2 bg-[#1a1a1a]/50 border border-[#a855f7]/30 rounded-2xl p-1.5 pl-4 focus-within:border-[#a855f7] focus-within:bg-[#1a1a1a] transition-all shadow-inner w-full">
                <input type="text" id="chatInput" placeholder="Posez une question à l'Assistant..." class="flex-1 bg-transparent outline-none text-white text-[13px] placeholder-white/40 disabled:opacity-50" onkeydown="if(event.key === 'Enter') window.sendMsg()">
                <button id="sendBtn" onclick="window.sendMsg()" class="w-9 h-9 rounded-xl bg-[#a855f7] hover:bg-purple-500 disabled:bg-gray-600 disabled:opacity-50 flex items-center justify-center text-white transition-transform active:scale-95 shrink-0 shadow-md">
                    <i class="fas fa-arrow-up text-sm"></i>
                </button>
            </div>

            <!-- Interface de Connexion via Clé LevelUp (Masquée par défaut) -->
            <div id="keyInputContainer" class="hidden items-center gap-2 bg-[#1a1a1a] border border-[#a855f7] rounded-2xl p-1.5 pl-4 shadow-[0_0_15px_rgba(168,85,247,0.2)] w-full relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-[#a855f7]/10 to-transparent pointer-events-none"></div>
                <i class="fas fa-key text-[#a855f7] z-10"></i>
                <input type="password" id="keyInput" placeholder="Collez votre Clé LevelUp ici..." class="flex-1 bg-transparent outline-none text-white text-[13px] placeholder-white/40 z-10" onkeydown="if(event.key === 'Enter') window.saveUserKey()">
                <button id="saveKeyBtn" onclick="window.saveUserKey()" class="px-4 h-9 rounded-xl bg-gradient-to-r from-[#a855f7] to-[#3b82f6] hover:brightness-110 flex items-center justify-center text-white font-bold text-[12px] transition-transform active:scale-95 shrink-0 shadow-md z-10">
                    Débloquer

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Configuration Firebase injectée
        const firebaseConfig = {
            apiKey: "AIzaSyA3JgvNu5p-43037jvm4WRDaJHI9ES7uGM",
            authDomain: "levelup-ia.firebaseapp.com",
            databaseURL: "https://levelup-ia-default-rtdb.firebaseio.com",
            projectId: "levelup-ia",
            storageBucket: "levelup-ia.firebasestorage.app",
            messagingSenderId: "229420004282",
            appId: "1:229420004282:web:6735f059a947f0936ae383",
            measurementId: "G-MSRDY2574K"
        };

        // --- CLES TMDB POUR RECHERCHES VISUELLES ---
        const TMDB_API_KEY = '027cc951d888c64e5f15dcb853c7347a';
        const TMDB_IMAGE_BASE_URL = 'https://image.tmdb.org/t/p/w500';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Variables de session et sécurité
        let isFirebaseReady = false;
        window.failedEmailAttempts = 0; // Compteur de sécurité anti-spam/hack

        signInAnonymously(auth).then(() => {
            isFirebaseReady = true;
        }).catch((error) => {
            // Silence des erreurs Firebase dans la console
        });

        // ==========================================
        // GESTION UTILISATEUR & LIMITES
        // ==========================================
        const GUEST_LIMIT = 25;
        let messagesCount = 0;
        let userLevelUpKey = localStorage.getItem('levelup_user_key') || null;

        function updateUIMode() {
            if (userLevelUpKey) {
                document.body.classList.remove('key-input-mode');
            } else {
                if (messagesCount >= GUEST_LIMIT) {
                    document.body.classList.add('key-input-mode');
                } else {
                    document.body.classList.remove('key-input-mode');
                }
            }
        }

        window.saveUserKey = function() {
            const key = document.getElementById('keyInput').value.trim();
            if(key.length > 10) {
                localStorage.setItem('levelup_user_key', key);
                userLevelUpKey = key;
                updateUIMode();
                appendBubble('ai', "✅ **Connexion réussie !** Votre Clé LevelUp a été validée. L'intelligence artificielle est maintenant débloquée en illimité.");
            } else {
                appendBubble('error', "La clé saisie semble invalide. Veuillez réessayer.");
            }
        }

        // ==========================================
        // LOGIQUE D'APPEL DIRECT À GEMINI
        // ==========================================
        let conversationHistory = []; 

        async function fetchGeminiKeyFromDB() {
            try {
                const keyDocRef = doc(db, 'artifacts', 'level-ia-premium', 'system', 'config');
                const keyDocSnap = await getDoc(keyDocRef);
                if (keyDocSnap.exists()) {
                    const keys = keyDocSnap.data().gemini_api_keys;
                    return Array.isArray(keys) ? keys[0] : keys;
                }
                return null;
            } catch (error) { return null; }
        }

        async function callGeminiAPI(prompt) {
            const apiKey = await fetchGeminiKeyFromDB();
            if (!apiKey) return { error: true, text: "Erreur de connexion à l'écosystème. Veuillez vérifier votre réseau." };

            conversationHistory.push({ role: "user", parts: [{ text: prompt }] });

            const systemInstruction = `Tu es l'Assistant IA officiel de l'Écosystème LevelUp. Tu connais parfaitement nos applications :
- LevelMovie : https://movie.levelup-ecosystem.com/
- LevelMusic : https://music.levelup-ecosystem.com/
- Level IA : https://ia.levelup-ecosystem.com/
- Dashboard : https://levelup-ecosystem.com/

RÈGLES DE SÉCURITÉ ET POSTURE :
1. Sois toujours professionnel, poli et concis.
2. Ne montre JAMAIS de clé LevelUp à l'écran. Si on te demande une clé, réponds UNIQUEMENT avec la balise : [ACTION:ASK_EMAIL_FOR_KEY]
3. Si un utilisateur est agressif ou spam, refuse de l'aider et utilise : [ACTION:CONTACT_SUPPORT]

AFFICHAGE DES FILMS (TRÈS IMPORTANT) 🍿 :
Si un utilisateur cherche ou demande un film/une série (ex: "Avez-vous Inception ?"), réponds oui poliment ET termine OBLIGATOIREMENT ton message par cette balise exacte : [ACTION:SHOW_MOVIE:Titre Du Film]. 
(Remplace "Titre Du Film" par le nom du film, sans guillemets).

Balises interactives supplémentaires :
[ACTION:OPEN_DASHBOARD] (Pour ouvrir le tableau de bord)
[ACTION:LOGIN] (Pour se connecter)
[ACTION:OPEN_ECOSYSTEM] (Découvrir l'écosystème)
[ACTION:OPEN_APP:movie] (Ouvrir LevelMovie)
[ACTION:OPEN_APP:music] (Ouvrir LevelMusic)
[ACTION:OPEN_APP:ia] (Ouvrir Level IA)
[ACTION:CONTACT_SUPPORT] (Afficher le support)`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const payload = {
                contents: conversationHistory,
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };
            const delays = [1000, 2000, 4000, 8000, 16000];

            for (let attempt = 0; attempt <= 5; attempt++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const aiText = data.candidates[0].content.parts[0].text;
                        conversationHistory.push({ role: "model", parts: [{ text: aiText }] });
                        return { error: false, text: aiText };
                    }
                    
                    if (response.status === 429 && attempt < 5) {
                        await new Promise(r => setTimeout(r, delays[attempt]));
                        continue;
                    }
                    
                    if (attempt >= 5) {
                        throw new Error("L'intelligence artificielle est très sollicitée en ce moment.");
                    }
                } catch (error) {
                    if (attempt < 5) {
                        await new Promise(r => setTimeout(r, delays[attempt]));
                        continue;
                    }
                    conversationHistory.pop();
                    return { error: true, text: "Le réseau de l'écosystème est actuellement très sollicité. Veuillez patienter quelques instants avant de réessayer." };
                }
            }
        }

    // ==========================================
    // FLUX D'EMAIL ET SÉCURITÉ ANTI-SPAM (FRONT-END)
    // ==========================================
    
    window.verifyEmailForRecovery = async function() {
        const emailInput = document.getElementById('recoveryEmailInput');
        if(!emailInput) return;
        const email = emailInput.value.trim().toLowerCase();
        if(!email || !email.includes('@')) return;

        // Bouclier Anti-Spam (Si + de 3 tentatives échouées, on bloque)
        if (window.failedEmailAttempts >= 3) {
            appendBubble('error', `🚨 <strong>Sécurité activée :</strong> Trop de tentatives suspectes. L'action est bloquée. Veuillez utiliser la commande "Contacter le support" si vous avez besoin d'aide.`);
            return;
        }

        const searchContainerId = 'search-container-' + Date.now();
        emailInput.parentElement.id = searchContainerId;
        document.getElementById(searchContainerId).innerHTML = `<span class="text-[13px] text-[#a855f7] font-medium flex items-center gap-2"><i class="fas fa-circle-notch fa-spin"></i> Recherche de ${email} en cours...</span>`;

        appendBubble('user', email);
        currentTypingId = 'typing-' + Date.now();
        appendTyping(currentTypingId);

        try {
            // RECHERCHE ROBUSTE DANS LA BASE
            const usersRef = collection(db, 'artifacts', 'level-ia-premium', 'public', 'data', 'talk_users');
            const querySnapshot = await getDocs(usersRef);

            if (currentTypingId) { document.getElementById(currentTypingId).remove(); currentTypingId = null; }

            let foundUser = null;

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const dbEmail = (data.email || data.mail || data.adresse_mail || "").toLowerCase();
                if (dbEmail === email) {
                    foundUser = data;
                }
            });

            if (foundUser) {
                // ✅ COMPTE TROUVÉ !
                window.failedEmailAttempts = 0; 
                document.getElementById(searchContainerId).innerHTML = `<span class="text-[13px] text-green-400 font-bold flex items-center gap-2"><i class="fas fa-check-circle"></i> Compte trouvé avec succès</span>`;
                
                const userName = foundUser.name || foundUser.pseudo || foundUser.nom || "Membre LevelUp";
                const userPhoto = foundUser.photoURL || foundUser.avatar || `https://ui-avatars.com/api/?name=${email}&background=a855f7&color=fff&size=128&rounded=true&bold=true`;

                const profileHtml = `
                    <p class="mb-3 text-[13px] text-zinc-200">J'ai bien trouvé votre profil dans notre base de données ! Est-ce que c'est vous ?</p>
                    <div class="p-3 bg-[#111116] border border-[#a855f7]/40 rounded-xl mb-4 flex items-center gap-3 shadow-lg">
                        <img src="${userPhoto}" alt="Profile" class="w-10 h-10 rounded-full border border-[#a855f7]/50 shadow-inner object-cover">
                        <div class="flex-1 min-w-0">
                            <p class="text-white text-[13px] font-bold truncate flex items-center gap-1.5">
                                ${userName} <i class="fas fa-certificate text-[#3b82f6] text-[11px]" title="Compte Vérifié"></i>
                            </p>
                            <p class="text-zinc-400 text-[11px] truncate font-medium">${email}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.confirmKeyGeneration('${email}')" class="flex-1 py-2.5 bg-[#a855f7] hover:bg-purple-500 rounded-lg text-white font-bold text-[11px] transition-transform active:scale-95 shadow-md uppercase tracking-wider flex items-center justify-center gap-1.5">
                            <i class="fas fa-check"></i> Oui, c'est moi
                        </button>
                        <button onclick="window.cancelKeyGeneration()" class="flex-1 py-2.5 bg-white/10 hover:bg-white/20 rounded-lg text-white font-bold text-[11px] transition-transform active:scale-95 uppercase tracking-wider">
                            Non, annuler
                        </button>
                    </div>
                `;
                appendBubble('ai', profileHtml);
            } else {
                // ❌ COMPTE INTROUVABLE
                window.failedEmailAttempts++; 
                document.getElementById(searchContainerId).innerHTML = `<span class="text-[13px] text-red-400 font-bold flex items-center gap-2"><i class="fas fa-times-circle"></i> Compte introuvable</span>`;
                
                let errorMsg = `Aucun compte LevelUp n'est associé à l'adresse <strong>${email}</strong>.`;
                
                if (window.failedEmailAttempts >= 3) {
                    errorMsg += `<br><br>🚨 <strong>Alerte de sécurité :</strong> Suite à de multiples tentatives échouées, cette fonctionnalité est temporairement verrouillée.`;
                } else {
                    errorMsg += `<br><br>Veuillez vérifier l'orthographe ou <a href="https://levelup-ecosystem.com/" target="_blank" class="underline text-blue-400 font-bold">créer un compte</a>. (Tentative ${window.failedEmailAttempts}/3)`;
                }
                
                appendBubble('error', errorMsg);
            }
        } catch (error) {
            if (currentTypingId) { document.getElementById(currentTypingId).remove(); currentTypingId = null; }
            document.getElementById(searchContainerId).innerHTML = `<span class="text-[13px] text-red-400 font-bold flex items-center gap-2"><i class="fas fa-exclamation-triangle"></i> Erreur Serveur</span>`;
            appendBubble('error', "Une perturbation réseau nous empêche d'effectuer cette recherche. Veuillez réessayer dans quelques instants.");
        }
    };

    window.confirmKeyGeneration = function(email) {
        appendBubble('user', "Oui, c'est moi. Envoyez ma clé.");
        currentTypingId = 'typing-' + Date.now();
        appendTyping(currentTypingId);

        // Envoi au vrai Backend via le parent pour déclencher la génération
        window.parent.postMessage({ action: 'backend_regenerate_key_for_email', email: email }, '*');

        setTimeout(() => {
            if (currentTypingId) { document.getElementById(currentTypingId).remove(); currentTypingId = null; }
            appendBubble('ai', `✅ **Validation Sécurisée !** <br><br>Veuillez vérifier votre boîte mail (<strong>${email}</strong>). Une nouvelle Clé LevelUp vient d'être générée et vous a été envoyée secrètement.<br><br>Puis-je vous aider pour autre chose ?`);
        }, 2000);
    };

    window.cancelKeyGeneration = function() {
        appendBubble('user', "Non, ce n'est pas moi. Annuler.");
        currentTypingId = 'typing-' + Date.now();
        appendTyping(currentTypingId);
        setTimeout(() => {
            if (currentTypingId) { document.getElementById(currentTypingId).remove(); currentTypingId = null; }
            appendBubble('ai', "Pas de problème, procédure annulée. N'hésitez pas à me demander si vous avez besoin d'autre chose !");
        }, 1000);
    };

        // ==========================================
        // GESTION DU CHAT 
        // ==========================================
        const ALL_PROMPTS = [
            "Quelles sont tes capacités en IA ?", "Régénère ma clé LevelUp.", "Ouvre LevelMovie.",
            "Je veux écouter de la musique.", "Y a-t-il le film Inception ?",
            "Y a-t-il la série Breaking Bad ?", "Mets une playlist pour réviser", 
            "Donne-moi une recommandation de film d'action", "Qu'est-ce que l'écosystème LevelUp ?", 
            "Comment contacter le support ?", "Lance l'application Level IA complète", "Ouvre mon tableau de bord"
        ];

        let firstMessageSent = false;
        let currentTypingId = null;
        let isWaitingForAI = false;

        window.minimizeIA = function() { window.parent.postMessage({ action: 'minimize_ia' }, '*'); };
        window.closeIA = function() { window.parent.postMessage({ action: 'close_ia' }, '*'); };
        window.closePromptsOverlay = function() { document.getElementById('allPromptsOverlay').classList.remove('open'); }
        window.openPromptsOverlay = function() { document.getElementById('allPromptsOverlay').classList.add('open'); }

        function shuffleAndDisplayPrompts() {
            const shuffled = [...ALL_PROMPTS].sort(() => 0.5 - Math.random());
            const container = document.getElementById('dynamicPromptsContainer');
            let html = '';
            for (let i = 0; i < 3; i++) {
                html += `<button onclick="window.sendMsg('${shuffled[i].replace(/'/g, "\\'")}')" class="px-4 py-2 rounded-full border border-[#a855f7]/40 bg-[#a855f7]/10 text-[#d8b4fe] hover:bg-[#a855f7]/20 text-[11px] font-medium transition-colors outline-none cursor-pointer text-left">${shuffled[i]}</button>`;
            }
            html += `<button onclick="window.openPromptsOverlay()" class="px-4 py-2 rounded-full border border-white/10 bg-white/5 text-white/70 hover:text-white hover:bg-white/10 text-[11px] font-medium transition-colors outline-none cursor-pointer flex items-center gap-2"><i class="fas fa-layer-group"></i> Voir plus</button>`;
            container.innerHTML = html;
        }

        function populateAllPromptsGrid() {
            const grid = document.getElementById('promptsGrid');
            let html = '';
            ALL_PROMPTS.forEach(p => {
                html += `<button onclick="window.sendMsg('${p.replace(/'/g, "\\'")}')" class="text-left px-4 py-2.5 rounded-xl border border-[#a855f7]/20 bg-[#a855f7]/5 text-white/80 hover:bg-[#a855f7]/20 hover:text-white hover:border-[#a855f7]/50 text-[12px] transition-all outline-none cursor-pointer flex-grow basis-[calc(50%-10px)] max-w-full">${p}</button>`;
            });
            grid.innerHTML = html;
        }

        window.onload = () => {
            shuffleAndDisplayPrompts();
            populateAllPromptsGrid();
            messagesCount = parseInt(localStorage.getItem(`ia_reqs_${new Date().toDateString()}`) || '0');
            updateUIMode();
        };

        // RENDU ASYNCHRONE DES MESSAGES (POUR CHARGER TMDB EN DIRECT)
        async function parseActionTags(text) {
            let html = text.replace(/\n/g, '<br>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            // Formulaire d'Email
            if (html.includes('[ACTION:ASK_EMAIL_FOR_KEY]')) {
                html = html.replace(/\[ACTION:ASK_EMAIL_FOR_KEY\]/g, '');
                html += `
                    <p class="mb-3 text-[13px] text-zinc-200">Pour des raisons de sécurité, veuillez m'indiquer l'adresse e-mail associée à votre compte LevelUp :</p>
                    <div class="p-3 bg-black/40 border border-[#a855f7]/30 rounded-xl flex flex-col gap-2">
                        <input type="email" id="recoveryEmailInput" placeholder="votre@email.com" class="w-full bg-transparent border-b border-white/20 p-2 text-white text-sm outline-none focus:border-[#a855f7] transition-colors">
                        <button onclick="window.verifyEmailForRecovery()" class="w-full py-2.5 mt-2 bg-gradient-to-r from-[#a855f7] to-[#3b82f6] hover:brightness-110 rounded-lg text-white font-bold text-[12px] transition-transform active:scale-95 shadow-md flex items-center justify-center gap-2">
                            <i class="fas fa-search"></i> Rechercher mon compte
                        </button>
                    </div>
                `;
            }

            // Cartes Support Pro
            html = html.replace(/\[ACTION:CONTACT_SUPPORT\]/g, `
                <div class="mt-4 flex flex-col gap-2.5">
                    <p class="text-[12px] text-zinc-300 font-medium mb-1">Voici nos canaux officiels pour contacter l'équipe :</p>
                    <a href="mailto:support@levelup-ecosystem.com" class="flex items-center gap-3 p-3 bg-gradient-to-r from-[#3b82f6]/10 to-[#3b82f6]/5 border border-[#3b82f6]/30 rounded-xl hover:bg-[#3b82f6]/20 transition-all text-white text-sm" style="text-decoration: none;">
                        <div class="w-8 h-8 rounded-full bg-[#3b82f6]/20 flex items-center justify-center text-[#3b82f6] shrink-0"><i class="fas fa-headset"></i></div>
                        <div class="flex flex-col">
                            <span class="font-bold text-blue-100 text-[13px]">Support Technique</span>
                            <span class="text-[11px] text-blue-300/70">support@levelup-ecosystem.com</span>
                        </div>
                    </a>
                    <a href="mailto:contact@levelup-ecosystem.com" class="flex items-center gap-3 p-3 bg-gradient-to-r from-[#a855f7]/10 to-[#a855f7]/5 border border-[#a855f7]/30 rounded-xl hover:bg-[#a855f7]/20 transition-all text-white text-sm" style="text-decoration: none;">
                        <div class="w-8 h-8 rounded-full bg-[#a855f7]/20 flex items-center justify-center text-[#a855f7] shrink-0"><i class="fas fa-envelope"></i></div>
                        <div class="flex flex-col">
                            <span class="font-bold text-purple-100 text-[13px]">Contact Général</span>
                            <span class="text-[11px] text-[#d8b4fe]/70">contact@levelup-ecosystem.com</span>
                        </div>
                    </a>
                </div>
            `);

            // Boutons de navigation classiques
            html = html.replace(/\[ACTION:LOGIN\]/g, `<button onclick="window.open('https://levelup-ecosystem.com/', '_blank')" class="ai-action-btn btn-google mt-3"><i class="fas fa-user-circle"></i> Se connecter</button>`);
            html = html.replace(/\[ACTION:OPEN_DASHBOARD\]/g, `<button onclick="window.open('https://levelup-ecosystem.com/', '_blank')" class="ai-action-btn btn-nav mt-3"><i class="fas fa-chart-line"></i> Ouvrir mon Tableau de Bord</button>`);
            html = html.replace(/\[ACTION:OPEN_ECOSYSTEM\]/g, `<button onclick="window.open('https://levelup-ecosystem.com/', '_blank')" class="ai-action-btn btn-nav mt-3"><i class="fas fa-globe"></i> Découvrir LevelUp Ecosystem</button>`);
            
            html = html.replace(/\[ACTION:OPEN_APP:(.*?)\]/g, (match, appId) => {
                let name, icon, url;
                if (appId === 'ia') { name = 'Level IA Premium'; icon = 'fa-brain'; url = 'https://ia.levelup-ecosystem.com/'; }
                else if (appId === 'movie') { name = 'LevelMovie'; icon = 'fa-clapperboard'; url = 'https://movie.levelup-ecosystem.com/'; }
                else if (appId === 'music') { name = 'LevelMusic'; icon = 'fa-music'; url = 'https://music.levelup-ecosystem.com/'; }
                else { return ''; }
                return `<button onclick="window.open('${url}', '_blank')" class="ai-action-btn btn-app mt-3"><i class="fas ${icon}"></i> Ouvrir ${name}</button>`;
            });

            // INTÉGRATION TMDB : AFFICHAGE DES FILMS / SÉRIES
            const movieRegex = /\[ACTION:SHOW_MOVIE:(.*?)\]/g;
            const matches = [...html.matchAll(movieRegex)];
            
            for (const match of matches) {
                const fullTag = match[0];
                const movieQuery = match[1].trim();
                
                try {
                    const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&language=fr-FR&query=${encodeURIComponent(movieQuery)}`);
                    const data = await res.json();
                    
                    let movie = null;
                    if (data.results && data.results.length > 0) {
                        movie = data.results.find(m => m.media_type === 'movie' || m.media_type === 'tv');
                    }

                    if (movie && (movie.backdrop_path || movie.poster_path)) {
                        const title = movie.title || movie.name;
                        const year = (movie.release_date || movie.first_air_date || '').substring(0, 4);
                        const typeTag = movie.media_type === 'tv' ? 'Série' : 'Film';
                        const desc = movie.overview ? (movie.overview.length > 100 ? movie.overview.substring(0, 100) + '...' : movie.overview) : "Découvrez ce contenu exclusif sur notre plateforme LevelMovie en haute définition.";
                        
                        const movieCardHtml = `
                            <div class="mt-4 p-1 rounded-xl bg-gradient-to-br from-[#a855f7]/40 to-[#111116] shadow-xl">
                                <div class="bg-[#111116] rounded-lg overflow-hidden border border-white/10 flex flex-col">
                                    <div class="h-40 w-full relative">
                                        <img src="${TMDB_IMAGE_BASE_URL}${movie.backdrop_path || movie.poster_path}" class="w-full h-full object-cover opacity-80" alt="Affiche">
                                        <div class="absolute inset-0 bg-gradient-to-t from-[#111116] via-transparent to-transparent"></div>
                                        <div class="absolute top-2 right-2 bg-black/60 backdrop-blur-md px-2 py-1 rounded text-white text-[9px] font-black tracking-widest border border-white/10 flex items-center gap-1">
                                            <i class="fas fa-star text-yellow-500"></i> ${(movie.vote_average || 0).toFixed(1)}
                                        </div>
                                        <div class="absolute bottom-3 left-3 right-3">
                                            <h4 class="text-white font-black text-sm truncate shadow-black drop-shadow-md">${title} <span class="text-white/50 text-[10px] font-normal">(${year})</span></h4>
                                            <span class="text-[9px] bg-[#a855f7] text-white px-2 py-0.5 rounded font-bold uppercase tracking-wider">${typeTag}</span>
                                        </div>
                                    </div>
                                    <div class="p-3">
                                        <p class="text-[10px] text-zinc-400 mb-3 line-clamp-2 leading-relaxed italic">"${desc}"</p>
                                        <button onclick="window.open('https://movie.levelup-ecosystem.com/', '_blank')" class="w-full py-2.5 bg-white/10 hover:bg-[#a855f7] rounded-lg text-white text-[10px] font-black uppercase tracking-widest transition-all active:scale-95 flex items-center justify-center gap-2 border border-white/5 outline-none">
                                            <i class="fas fa-play"></i> Regarder sur LevelMovie
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                        html = html.replace(fullTag, movieCardHtml);
                    } else {
                        // Si le film est sur TMDB mais n'a pas de visuel
                        html = html.replace(fullTag, `<div class="mt-2 text-[11px] text-yellow-500 italic"><i class="fas fa-info-circle"></i> Le visuel de ce titre n'est pas disponible, mais vous pouvez le chercher directement sur LevelMovie.</div>`);
                    }
                } catch (e) {
                    // En cas d'erreur de recherche TMDB
                    html = html.replace(fullTag, '');
                }
            }
            
            return html;
        }

        window.sendMsg = async function(overrideText = null) {
            if (isWaitingForAI) return;
            const input = document.getElementById('chatInput');
            const btn = document.getElementById('sendBtn');
            const text = overrideText || input.value.trim();
            if (!text) return;

            if (document.body.classList.contains('mini-mode')) {
                document.body.classList.remove('mini-mode');
                window.parent.postMessage({ action: 'expand_ia' }, '*');
            }

            if (!userLevelUpKey && messagesCount >= GUEST_LIMIT) {
                updateUIMode(); 
                appendBubble('ai', `⚠️ Votre session découverte est terminée.<br><br>Veuillez entrer votre **Clé LevelUp** dans la barre ci-dessous pour débloquer l'accès illimité.`);
                return;
            }

            if (!isFirebaseReady) {
                appendBubble('error', "Connexion sécurisée en cours, veuillez patienter un instant...");
                return;
            }

            isWaitingForAI = true;
            input.value = '';
            input.disabled = true;
            input.placeholder = "L'IA réfléchit...";
            btn.disabled = true;
            document.getElementById('allPromptsOverlay').classList.remove('open');

            if (!firstMessageSent) {
                firstMessageSent = true;
                document.getElementById('welcomeBlock').classList.add('fade-out-up');
            }

            if (!userLevelUpKey) {
                messagesCount++;
                localStorage.setItem(`ia_reqs_${new Date().toDateString()}`, messagesCount);
                updateUIMode();
            }

            appendBubble('user', text);
            currentTypingId = 'typing-' + Date.now();
            appendTyping(currentTypingId);
            document.getElementById('headerIcon').classList.add('fa-spin');

            try {
                const result = await callGeminiAPI(text);
                
                isWaitingForAI = false;
                input.disabled = false;
                input.placeholder = "Posez une question à l'Assistant...";
                btn.disabled = false;
                
                if (currentTypingId) {
                    const el = document.getElementById(currentTypingId);
                    if (el) el.remove();
                    currentTypingId = null;
                }
                document.getElementById('headerIcon').classList.remove('fa-spin');
                input.focus();

                if (result.error) {
                    // Les erreurs venant de l'API sont déjà filtrées en texte Pro dans callGeminiAPI
                    appendBubble('error', result.text);
                } else {
                    // On UTILISE LE AWAIT pour permettre le chargement TMDB
                    const finalHtml = await parseActionTags(result.text);
                    appendBubble('ai', finalHtml);
                }
            } catch (err) {
                isWaitingForAI = false;
                input.disabled = false;
                btn.disabled = false;
                if (currentTypingId) {
                    const el = document.getElementById(currentTypingId);
                    if (el) el.remove();
                }
                document.getElementById('headerIcon').classList.remove('fa-spin');
                
                // ULTIME BOUCLIER ANTI-ERREUR DEV
                appendBubble('error', "Le réseau de l'écosystème rencontre une légère perturbation. Veuillez réessayer dans un instant.");
            }
        };

        function appendBubble(type, htmlContent) {
            const hist = document.getElementById('chatHistory');
            const div = document.createElement('div');
            if (type === 'user') {
                div.className = 'flex justify-end w-full msg-in';
                div.innerHTML = `<div class="bg-[#a855f7] text-white text-[13px] px-4 py-2.5 rounded-2xl rounded-tr-sm max-w-[85%] leading-relaxed shadow-md">${htmlContent}</div>`;
            } else if (type === 'ai') {
                div.className = 'flex justify-start w-full gap-2 msg-in-ai';
                div.innerHTML = `
                    <div class="w-6 h-6 rounded-full bg-[#a855f7]/20 border border-[#a855f7]/30 flex items-center justify-center text-[#a855f7] flex-shrink-0 mt-1"><i class="fas fa-star text-[10px]"></i></div>
                    <div class="bg-[#1a1a1a] border border-white/5 text-zinc-200 text-[13px] px-4 py-3 rounded-2xl rounded-tl-sm max-w-[85%] leading-relaxed shadow-md w-full overflow-hidden">${htmlContent}</div>
                `;
            } else if (type === 'error') {
                div.className = 'flex justify-start w-full gap-2 msg-in-ai';
                // Couleur orange pro au lieu du rouge sanglant pour les alertes réseau
                div.innerHTML = `
                    <div class="w-6 h-6 rounded-full bg-orange-500/20 text-orange-400 flex items-center justify-center flex-shrink-0 mt-1"><i class="fas fa-exclamation-triangle text-[10px]"></i></div>
                    <div class="bg-orange-500/10 border border-orange-500/20 text-orange-300 text-[13px] px-4 py-3 rounded-2xl rounded-tl-sm max-w-[85%]">${htmlContent}</div>
                `;
            }
            hist.appendChild(div);
            scrollToBottom();
        }

        function appendTyping(id) {
            const hist = document.getElementById('chatHistory');
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex justify-start w-full gap-2 msg-in-ai';
            div.innerHTML = `<div class="w-6 h-6 rounded-full bg-[#a855f7]/20 border border-[#a855f7]/30 flex items-center justify-center text-[#a855f7] flex-shrink-0 mt-1"><i class="fas fa-star text-[10px]"></i></div><div class="bg-[#1a1a1a] border border-white/5 px-4 py-3.5 rounded-2xl rounded-tl-sm flex items-center gap-1 shadow-md"><span class="w-1.5 h-1.5 bg-zinc-400 rounded-full animate-bounce"></span><span class="w-1.5 h-1.5 bg-zinc-400 rounded-full animate-bounce" style="animation-delay:0.1s"></span><span class="w-1.5 h-1.5 bg-zinc-400 rounded-full animate-bounce" style="animation-delay:0.2s"></span></div>`;
            hist.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            const area = document.getElementById('chatArea');
            area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
