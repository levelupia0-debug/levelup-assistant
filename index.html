        // Récupère l'URL de l'endpoint email (essai SDK d'abord, puis system/config)

            // 1. Essai via Firebase du SDK (a accès à config/email_api)
            try {
                if (window.__lvlup_db && window.__lvlup_getDoc && window.__lvlup_doc) {

                    );
                    if (snap.exists() && snap.data().endpointUrl) {
                        _cachedEmailApiUrl = snap.data().endpointUrl;
                        return _cachedEmailApiUrl;
                    }
                }
            } catch(_) {}
            // 2. Fallback via auth anonyme → system/config (lisible par tous les auth)
            try {
                const snap = await getDoc(doc(db, 'artifacts/level-ia-premium/system/config'));
                if (snap.exists() && snap.data().emailApiUrl) {

        // Bypass Cloudflare Turnstile si le domaine n'est pas whitelisté (erreur 110200)

        const _turnstileObserver = new MutationObserver(() => {

                setTimeout(() => {
                    const b = document.getElementById('_lvl_gbtn');
                    if (b && b.disabled) {
                        b.disabled = false;
                        b.style.opacity = '1';
                        b.style.cursor = 'pointer';
                    }
                }, 2000);
            }
        });
        _turnstileObserver.observe(document.body, { childList: true, subtree: false });

        signInAnonymously(auth).then(() => {
            isFirebaseReady = true;
        }).catch((error) => {
            // Silence des erreurs Firebase dans la console
        });

        // ==========================================
        // INTÉGRATION SDK LEVELUP
        // ==========================================
        window.addEventListener('load', () => {
            if (typeof LevelUp === 'undefined') return;

            // Mise à jour de l'interface quand l'utilisateur se connecte
            LevelUp.onLogin((user) => {
                const greeting = document.getElementById('userGreeting');
                if (greeting) {
                    greeting.textContent = `Bonjour, ${user.name || user.email} ✦`;
                }
                // Réinitialiser la limite pour les utilisateurs connectés
                userLevelUpKey = user.uid || 'sdk-auth';
                localStorage.setItem('levelup_user_key', userLevelUpKey);
                updateUIMode();
            });

            // Mise à jour quand l'utilisateur se déconnecte
            LevelUp.onLogout(() => {
                const greeting = document.getElementById('userGreeting');
                if (greeting) greeting.textContent = 'Prêt à vous aider';
                userLevelUpKey = null;
                localStorage.removeItem('levelup_user_key');
                updateUIMode();

            // Si déjà connecté au chargement

                const greeting = document.getElementById('userGreeting');
                if (greeting && user) greeting.textContent = `Bonjour, ${user.name || user.email} ✦`;

                localStorage.setItem('levelup_user_key', userLevelUpKey);

        });

        // ==========================================
        // GESTION UTILISATEUR & LIMITES
        // ==========================================
        const GUEST_LIMIT = 25;
        let messagesCount = 0;
        let userLevelUpKey = localStorage.getItem('levelup_user_key') || null;

        function updateUIMode() {
            if (userLevelUpKey) {
                document.body.classList.remove('key-input-mode');
            } else {
                if (messagesCount >= GUEST_LIMIT) {
                    document.body.classList.add('key-input-mode');
                } else {
                    document.body.classList.remove('key-input-mode');
                }
            }
        }

        window.saveUserKey = function() {
            const key = document.getElementById('keyInput').value.trim();
            if(key.length > 10) {
                localStorage.setItem('levelup_user_key', key);
                userLevelUpKey = key;
                updateUIMode();

        // ==========================================
        // LOGIQUE D'APPEL DIRECT À GEMINI
        // ==========================================
        let conversationHistory = []; 

        let cachedGeminiKeys = null;
        let currentKeyIndex = 0;
        let cachedBrain = null;

        async function fetchAllGeminiKeys() {
            if (cachedGeminiKeys) return cachedGeminiKeys;
            try {
                const keyDocRef = doc(db, 'artifacts', 'level-ia-premium', 'system', 'config');
                const keyDocSnap = await getDoc(keyDocRef);
                if (keyDocSnap.exists()) {
                    const keys = keyDocSnap.data().gemini_api_keys;
                    cachedGeminiKeys = Array.isArray(keys) ? keys : [keys];
                    return cachedGeminiKeys;
                }
                return [];
            } catch (error) { return []; }
        }

        async function fetchBrainFromDB() {
            if (cachedBrain) return cachedBrain;
            try {
                const brainRef = doc(db, 'artifacts', 'level-ia-premium', 'system', 'brain');
                const brainSnap = await getDoc(brainRef);
                if (brainSnap.exists() && brainSnap.data().prompt) {
                    cachedBrain = brainSnap.data().prompt;
                    return cachedBrain;
                }
            } catch (e) {}
            return null;
        }

        const DEFAULT_BRAIN = `Tu es l'Assistant IA officiel de l'Écosystème LevelUp. Tu connais parfaitement nos applications :
- LevelMovie : https://movie.levelup-ecosystem.com/ (streaming de films et séries)
- LevelMusic : https://music.levelup-ecosystem.com/ (musique en streaming)
- Level IA : https://ia.levelup-ecosystem.com/ (IA avancée full-featured)

2. Précise que LevelMovie possède des serveurs de streaming dédiés — l'utilisateur peut regarder instantanément SANS téléchargement, directement dans le navigateur.

        async function callGeminiAPI(prompt) {
            const allKeys = await fetchAllGeminiKeys();
            if (!allKeys || allKeys.length === 0) return { error: true, text: "Erreur de connexion à l'écosystème. Veuillez vérifier votre réseau." };

            conversationHistory.push({ role: "user", parts: [{ text: prompt }] });

            const remoteBrain = await fetchBrainFromDB();
            const systemInstruction = remoteBrain || DEFAULT_BRAIN;

            const payload = {
                contents: conversationHistory,
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            // Rotation intelligente : on tente chaque clé disponible
            for (let keyAttempt = 0; keyAttempt < allKeys.length; keyAttempt++) {
                const keyIdx = (currentKeyIndex + keyAttempt) % allKeys.length;
                const apiKey = allKeys[keyIdx];
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const aiText = data.candidates[0].content.parts[0].text;
                        conversationHistory.push({ role: "model", parts: [{ text: aiText }] });
                        currentKeyIndex = keyIdx; // Mémoriser la clé qui a réussi
                        return { error: false, text: aiText };
                    }

                    if (response.status === 429 || response.status === 403) {
                        // Quota épuisé ou clé invalide → passer à la suivante
                        currentKeyIndex = (keyIdx + 1) % allKeys.length;
                        continue;
                    }

                    // Autre erreur → on abandonne cette clé aussi
                    continue;

                } catch (error) {
                    // Erreur réseau → essayer la clé suivante
                    currentKeyIndex = (keyIdx + 1) % allKeys.length;
                    continue;
                }
            }

            // Toutes les clés ont échoué
            conversationHistory.pop();
            return { error: true, text: "Le réseau de l'écosystème est actuellement très sollicité. Veuillez patienter quelques instants avant de réessayer." };
        }

                const newKey = `LVL-${seg(5)}-${seg(5)}`;

                                        <div class="absolute inset-0 bg-gradient-to-t from-[#111116] via-transparent to-transparent"></div>
                                        <div class="absolute top-2 right-2 bg-black/60 backdrop-blur-md px-2 py-1 rounded text-white text-[9px] font-black tracking-widest border border-white/10 flex items-center gap-1">
                                            <i class="fas fa-star text-yellow-500"></i> ${(movie.vote_average || 0).toFixed(1)}
                                        </div>
                                        <div class="absolute bottom-3 left-3 right-3">
                                            <h4 class="text-white font-black text-sm truncate shadow-black drop-shadow-md">${title} <span class="text-white/50 text-[10px] font-normal">(${year})</span></h4>
                                            <span class="text-[9px] bg-[#a855f7] text-white px-2 py-0.5 rounded font-bold uppercase tracking-wider">${typeTag}</span>
                                        </div>
                                    </div>
                                    <div class="p-3">
                                        ${shortDesc ? `<p class="text-[10px] text-zinc-400 mb-1 leading-relaxed">${shortDesc}</p>` : ''}
                                        ${fullDesc.length > 90 ? `<button onclick="window.showMovieFullDesc('${descEscaped}')" class="text-[10px] text-[#a855f7] font-semibold mb-2 hover:text-purple-400 bg-transparent border-none cursor-pointer p-0">Voir plus →</button>` : ''}
                                        <div class="flex gap-2 mt-1">
                                            <button onclick="window.open('https://movie.levelup-ecosystem.com/', '_blank')" class="flex-1 py-2.5 bg-[#a855f7]/20 hover:bg-[#a855f7] rounded-lg text-white text-[10px] font-black uppercase tracking-widest transition-all active:scale-95 flex items-center justify-center gap-1.5 border border-[#a855f7]/30 outline-none">
                                                <i class="fas fa-play text-[9px]"></i> LevelMovie
                                            </button>
                                            <button onclick="window.showMovieSources('${movieIdStr}', '${mediaTypeStr}', '${titleEscaped}')" class="flex-1 py-2.5 bg-white/5 hover:bg-white/10 rounded-lg text-white/70 text-[10px] font-black uppercase tracking-widest transition-all active:scale-95 flex items-center justify-center gap-1.5 border border-white/10 outline-none">
                                                <i class="fas fa-tv text-[9px]"></i> Sources légales
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                        html = html.replace(fullTag, movieCardHtml);
                    } else {
                        html = html.replace(fullTag, `<div class="mt-2 text-[11px] text-yellow-500 italic"><i class="fas fa-info-circle"></i> Le visuel de ce titre n'est pas disponible, mais vous pouvez le chercher sur LevelMovie.</div>`);
                    }
                } catch (e) {
                    html = html.replace(fullTag, '');
                }
            }

            // ============================================
            // CARTES MUSIQUE (iTunes API)
            // ============================================
            const musicRegex = /\[ACTION:SHOW_MUSIC:(.*?)\]/g;
            const musicMatches = [...html.matchAll(musicRegex)];

            for (const match of musicMatches) {
                const fullTag = match[0];
                const musicQuery = match[1].trim();
                try {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(musicQuery)}&media=music&limit=1&country=fr`);
                    const data = await res.json();
                    if (data.results && data.results.length > 0) {
                        const track = data.results[0];
                        const artworkHigh = (track.artworkUrl100 || '').replace('100x100', '300x300');
                        const previewUrl = track.previewUrl || '';
                        const appleMusicUrl = track.trackViewUrl || '';
                        const previewId = 'preview-' + Date.now() + Math.random().toString(36).substr(2, 5);

                        const musicCardHtml = `
                            <div class="mt-4 p-1 rounded-xl bg-gradient-to-br from-[#ec4899]/40 to-[#111116] shadow-xl">
                                <div class="bg-[#111116] rounded-lg overflow-hidden border border-white/10 p-3 flex gap-3">
                                    ${artworkHigh ? `<img src="${artworkHigh}" class="w-16 h-16 rounded-xl object-cover shadow-lg flex-shrink-0" alt="Artwork">` : `<div class="w-16 h-16 rounded-xl bg-[#ec4899]/20 flex items-center justify-center flex-shrink-0"><i class="fas fa-music text-[#ec4899] text-xl"></i></div>`}
                                    <div class="flex-1 min-w-0">
                                        <h4 class="text-white font-black text-sm truncate">${track.trackName || musicQuery}</h4>
                                        <p class="text-zinc-400 text-[11px] truncate">${track.artistName || ''}</p>
                                        <p class="text-zinc-500 text-[10px] truncate italic">${track.collectionName || ''}</p>
                                        <div class="flex gap-2 mt-2">
                                            <button onclick="window.open('https://music.levelup-ecosystem.com/', '_blank')" class="flex-1 py-1.5 bg-[#ec4899]/20 border border-[#ec4899]/30 rounded-lg text-[#ec4899] text-[10px] font-black uppercase tracking-wider active:scale-95 flex items-center justify-center gap-1 transition-all hover:bg-[#ec4899]/40"><i class="fas fa-music text-[8px]"></i> LevelMusic</button>
                                            ${appleMusicUrl ? `<a href="${appleMusicUrl}" target="_blank" class="flex-1 py-1.5 bg-white/5 border border-white/10 rounded-lg text-white/70 text-[10px] font-black uppercase tracking-wider active:scale-95 flex items-center justify-center gap-1 no-underline hover:bg-white/10"><i class="fab fa-apple text-[10px]"></i> Apple Music</a>` : ''}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                        html = html.replace(fullTag, musicCardHtml);
                    } else {
                        html = html.replace(fullTag, `<div class="mt-2 text-[11px] text-yellow-500 italic"><i class="fas fa-music"></i> Aucun résultat musical trouvé pour cette recherche.</div>`);
                    }
                } catch (e) {
                    html = html.replace(fullTag, '');
                }
            }

            return html;
        }

        window.sendMsg = async function(overrideText = null) {
            if (isWaitingForAI) return;
            const input = document.getElementById('chatInput');
            const btn = document.getElementById('sendBtn');
            const text = overrideText || input.value.trim();
            if (!text) return;

            if (document.body.classList.contains('mini-mode')) {
                document.body.classList.remove('mini-mode');
                window.parent.postMessage({ action: 'expand_ia' }, '*');
            }

            if (!userLevelUpKey && messagesCount >= GUEST_LIMIT) {
                updateUIMode(); 
                appendBubble('ai', `⚠️ Votre session découverte est terminée.<br><br>Veuillez entrer votre **Clé LevelUp** dans la barre ci-dessous pour débloquer l'accès illimité.`);
                return;
            }

            if (!isFirebaseReady) {
                appendBubble('error', "Connexion sécurisée en cours, veuillez patienter un instant...");
                return;
            }

            isWaitingForAI = true;
            input.value = '';
            input.disabled = true;
            input.placeholder = "L'IA réfléchit...";
            btn.disabled = true;
            document.getElementById('allPromptsOverlay').classList.remove('open');

            if (!firstMessageSent) {
                firstMessageSent = true;
                document.getElementById('welcomeBlock').classList.add('fade-out-up');
            }

            if (!userLevelUpKey) {
                messagesCount++;
                localStorage.setItem(`ia_reqs_${new Date().toDateString()}`, messagesCount);
                updateUIMode();
            }

            appendBubble('user', text);
            currentTypingId = 'typing-' + Date.now();
            appendTyping(currentTypingId);
            document.getElementById('headerIcon').classList.add('fa-spin');

            try {
                const result = await callGeminiAPI(text);

                isWaitingForAI = false;
                input.disabled = false;
                input.placeholder = "Posez une question à l'Assistant...";
                btn.disabled = false;

                if (currentTypingId) {
                    const el = document.getElementById(currentTypingId);
                    if (el) el.remove();
                    currentTypingId = null;
                }
                document.getElementById('headerIcon').classList.remove('fa-spin');
                input.focus();

                if (result.error) {
                    // Les erreurs venant de l'API sont déjà filtrées en texte Pro dans callGeminiAPI
                    appendBubble('error', result.text);
                } else {
                    // On UTILISE LE AWAIT pour permettre le chargement TMDB
                    const finalHtml = await parseActionTags(result.text);
                    appendBubble('ai', finalHtml);
                }
            } catch (err) {
                isWaitingForAI = false;
                input.disabled = false;
                btn.disabled = false;
                if (currentTypingId) {
                    const el = document.getElementById(currentTypingId);
                    if (el) el.remove();
                }
                document.getElementById('headerIcon').classList.remove('fa-spin');

                // ULTIME BOUCLIER ANTI-ERREUR DEV
                appendBubble('error', "Le réseau de l'écosystème rencontre une légère perturbation. Veuillez réessayer dans un instant.");
            }
        };

        function appendBubble(type, htmlContent) {
            const hist = document.getElementById('chatHistory');
            const div = document.createElement('div');
            if (type === 'user') {
                div.className = 'flex justify-end w-full msg-in';
                div.innerHTML = `<div class="bg-[#a855f7] text-white text-[13px] px-4 py-2.5 rounded-2xl rounded-tr-sm max-w-[85%] leading-relaxed shadow-md">${htmlContent}</div>`;
            } else if (type === 'ai') {
                div.className = 'flex justify-start w-full gap-2 msg-in-ai';
                div.innerHTML = `
                    <div class="w-6 h-6 rounded-full bg-[#a855f7]/20 border border-[#a855f7]/30 flex items-center justify-center text-[#a855f7] flex-shrink-0 mt-1"><i class="fas fa-star text-[10px]"></i></div>
                    <div class="bg-[#1a1a1a] border border-white/5 text-zinc-200 text-[13px] px-4 py-3 rounded-2xl rounded-tl-sm max-w-[85%] leading-relaxed shadow-md w-full overflow-hidden">${htmlContent}</div>
                `;
            } else if (type === 'error') {
                div.className = 'flex justify-start w-full gap-2 msg-in-ai';
                // Couleur orange pro au lieu du rouge sanglant pour les alertes réseau
                div.innerHTML = `
                    <div class="w-6 h-6 rounded-full bg-orange-500/20 text-orange-400 flex items-center justify-center flex-shrink-0 mt-1"><i class="fas fa-exclamation-triangle text-[10px]"></i></div>
                    <div class="bg-orange-500/10 border border-orange-500/20 text-orange-300 text-[13px] px-4 py-3 rounded-2xl rounded-tl-sm max-w-[85%]">${htmlContent}</div>
                `;
            }
            hist.appendChild(div);
            scrollToBottom();
        }

        function appendTyping(id) {
            const hist = document.getElementById('chatHistory');
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex justify-start w-full gap-2 msg-in-ai';
            div.innerHTML = `<div class="w-6 h-6 rounded-full bg-[#a855f7]/20 border border-[#a855f7]/30 flex items-center justify-center text-[#a855f7] flex-shrink-0 mt-1"><i class="fas fa-star text-[10px]"></i></div><div class="bg-[#1a1a1a] border border-white/5 px-4 py-3.5 rounded-2xl rounded-tl-sm flex items-center gap-1 shadow-md"><span class="w-1.5 h-1.5 bg-zinc-400 rounded-full animate-bounce"></span><span class="w-1.5 h-1.5 bg-zinc-400 rounded-full animate-bounce" style="animation-delay:0.1s"></span><span class="w-1.5 h-1.5 bg-zinc-400 rounded-full animate-bounce" style="animation-delay:0.2s"></span></div>`;
            hist.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            const area = document.getElementById('chatArea');
            area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
        }

        // ==========================================
        // MODAL GLOBAL
        // ==========================================
        window.openGlobalModal = function(title, body) {
            document.getElementById('globalModalTitle').textContent = title;
            document.getElementById('globalModalBody').innerHTML = body;
            document.getElementById('globalModal').classList.remove('hidden');
        };

        window.closeGlobalModal = function() {
            document.getElementById('globalModal').classList.add('hidden');
        };

        window.showMovieFullDesc = function(desc) {
            window.openGlobalModal('Description complète', `<p class="text-zinc-300 text-sm leading-relaxed">${desc}</p>`);
        };

        const TMDB_PROVIDER_MAP = {
            8:   { name: 'Netflix',           url: (t) => `https://www.netflix.com/search?q=${encodeURIComponent(t)}` },
            9:   { name: 'Amazon Prime Video',url: (t) => `https://www.primevideo.com/search/?phrase=${encodeURIComponent(t)}` },
            337: { name: 'Disney+',           url: (t) => `https://www.disneyplus.com/search/${encodeURIComponent(t)}` },
            350: { name: 'Apple TV+',         url: (t) => `https://tv.apple.com/search?term=${encodeURIComponent(t)}` },
            381: { name: 'Canal+',            url: (t) => `https://www.canalplus.com/recherche/?q=${encodeURIComponent(t)}` },
            35:  { name: 'Rakuten TV',        url: (t) => `https://rakuten.tv/fr/search?query=${encodeURIComponent(t)}` },
            2:   { name: 'Apple iTunes',      url: (t) => `https://itunes.apple.com/fr/search?term=${encodeURIComponent(t)}` },
            531: { name: 'Paramount+',        url: (t) => `https://www.paramountplus.com/fr/search/?query=${encodeURIComponent(t)}` },
        };

        window.showMovieSources = async function(movieId, mediaType, title) {
            window.openGlobalModal('Sources légales', `<div class="flex justify-center py-6"><div class="w-5 h-5 border-2 border-[#a855f7] border-t-transparent rounded-full animate-spin"></div></div>`);
            try {
                const endpoint = mediaType === 'tv' ? 'tv' : 'movie';
                const res = await fetch(`https://api.themoviedb.org/3/${endpoint}/${movieId}/watch/providers?api_key=${TMDB_API_KEY}`);
                const data = await res.json();
                const frData = data.results && data.results.FR;
                const raw = frData ? [...(frData.flatrate || []), ...(frData.rent || []), ...(frData.buy || [])] : [];
                const seen = new Set();
                const providers = raw.filter(p => { if (seen.has(p.provider_id)) return false; seen.add(p.provider_id); return true; });

                if (providers.length === 0) {
                    document.getElementById('globalModalBody').innerHTML = `
                        <div class="flex flex-col items-center gap-3 py-8 text-center">
                            <i class="fas fa-satellite-dish text-4xl text-zinc-600"></i>
                            <p class="text-zinc-400 text-sm font-medium">Oups, on dirait qu'il n'y a pas d'autre source légale disponible en France pour ce titre.</p>
                            <p class="text-zinc-600 text-xs">Vous pouvez le regarder directement sur LevelMovie.</p>
                        </div>`;
                } else {
                    const list = providers.map(p => {
                        const info = TMDB_PROVIDER_MAP[p.provider_id];
                        const url = info ? info.url(title) : `https://www.google.com/search?q=${encodeURIComponent(title + ' streaming légal')}`;
                        const logo = p.logo_path ? `https://image.tmdb.org/t/p/w45${p.logo_path}` : '';
                        return `<a href="${url}" target="_blank" class="flex items-center gap-3 p-3 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all" style="text-decoration:none;">
                            ${logo ? `<img src="${logo}" class="w-9 h-9 rounded-lg object-cover flex-shrink-0" alt="${p.provider_name}">` : `<div class="w-9 h-9 rounded-lg bg-white/10 flex items-center justify-center flex-shrink-0"><i class="fas fa-play text-white/50 text-xs"></i></div>`}
                            <div class="flex-1 min-w-0">
                                <p class="text-white text-sm font-bold">${p.provider_name}</p>
                                <p class="text-zinc-500 text-[10px]">Streaming légal</p>
                            </div>
                            <i class="fas fa-external-link-alt text-zinc-600 text-xs"></i>
                        </a>`;
                    }).join('');
                    document.getElementById('globalModalBody').innerHTML = `
                        <div class="flex flex-col gap-2">
                            <p class="text-zinc-500 text-[11px] mb-1">Sources disponibles en France :</p>
                            ${list}
                        </div>`;
                }
            } catch (e) {
                document.getElementById('globalModalBody').innerHTML = `<p class="text-zinc-400 text-sm text-center py-4">Impossible de récupérer les sources. Réessayez plus tard.</p>`;
            }
        };

        // ==========================================
        // LECTEUR AUDIO MUSIQUE (PRÉVISUALISATION)
        // ==========================================
        let currentMusicAudio = null;
        let currentPreviewBtnId = null;

        window.toggleMusicPreview = function(url, btnId) {
            const btn = document.getElementById(btnId);
            if (currentMusicAudio && !currentMusicAudio.paused) {
                currentMusicAudio.pause();
                if (currentPreviewBtnId) {
                    const prevBtn = document.getElementById(currentPreviewBtnId);
                    if (prevBtn) prevBtn.innerHTML = '<i class="fas fa-play text-[8px]"></i> Écouter';
                }
                if (currentPreviewBtnId === btnId) { currentMusicAudio = null; currentPreviewBtnId = null; return; }
            }
            currentMusicAudio = new Audio(url);
            currentPreviewBtnId = btnId;
            currentMusicAudio.play().catch(() => {});
            if (btn) btn.innerHTML = '<i class="fas fa-pause text-[8px]"></i> Pause';
            currentMusicAudio.onended = () => {
                if (btn) btn.innerHTML = '<i class="fas fa-play text-[8px]"></i> Écouter';
                currentMusicAudio = null; currentPreviewBtnId = null;
            };
        };

    </script>
</body>
</html>
